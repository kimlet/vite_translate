name: vibe_translate
description: "Real-time offline auto-translation conversation app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  record: ^5.2.1
  ffi: ^2.1.3
  path_provider: ^2.1.5
  dio: ^5.7.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.4
  flutter_animate: ^4.5.2
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  ffigen: ^16.0.0

flutter:
  uses-material-design: true
